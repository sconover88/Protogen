<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homepage</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="clouds">
        <div class="cloud c1"></div>
        <div class="cloud c2"></div>
        <div class="cloud c3"></div>
        <div class="cloud c4"></div>
        <svg class="rainbow" width="200" height="100" viewBox="0 0 200 100" xmlns="http://www.w3.org/2000/svg">
            <g>
                <path d="M0 100 Q100 0 200 100 L200 110 L0 110 Z" fill="#FF0000"/>
                <path d="M5 100 Q100 10 195 100 L195 110 L5 110 Z" fill="#FFA500"/>
                <path d="M10 100 Q100 20 190 100 L190 110 L10 110 Z" fill="#FFFF00"/>
                <path d="M15 100 Q100 30 185 100 L185 110 L15 110 Z" fill="#00FF00"/>
                <path d="M20 100 Q100 40 180 100 L180 110 L20 110 Z" fill="#0000FF"/>
                <path d="M25 100 Q100 50 175 100 L175 110 L25 110 Z" fill="#4B0082"/>
                <path d="M30 100 Q100 60 170 100 L170 110 L30 110 Z" fill="#9400D3"/>
            </g>
        </svg>
    </div>
    <div class="container">
        <h1>Hello World</h1>
        <p>Welcome to my simple website</p>
        <div class="photo-wrapper">
            <img src="me.jpg" alt="Photo of me" class="profile-photo">
        </div>
        <button class="contact-button">Contact Me</button>
    </div>
</body>
</html>
